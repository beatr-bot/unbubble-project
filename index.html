<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unbubble — Fact Checker</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --surface2: #1c1c28;
            --border: #2a2a3d;
            --accent: #7b61ff;
            --accent2: #ff6b6b;
            --true: #00e5a0;
            --partial: #ffb347;
            --fake: #ff4d6d;
            --opinion: #7b61ff;
            --text: #e8e8f0;
            --muted: #6b6b8a;
            --font-head: 'Syne', sans-serif;
            --font-mono: 'DM Mono', monospace;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-head);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── Background grid ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(123, 97, 255, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(123, 97, 255, 0.04) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none;
            z-index: 0;
        }

        /* ── Glow orbs ── */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.18;
            pointer-events: none;
            z-index: 0;
        }

        .orb-1 {
            width: 600px;
            height: 600px;
            background: var(--accent);
            top: -200px;
            left: -150px;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            background: var(--accent2);
            bottom: -100px;
            right: -100px;
        }

        /* ── Layout ── */
        .wrapper {
            position: relative;
            z-index: 1;
            max-width: 820px;
            margin: 0 auto;
            padding: 60px 24px 100px;
        }

        /* ── Header ── */
        header {
            margin-bottom: 64px;
            animation: fadeUp 0.6s ease both;
        }

        .logo-row {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 12px;
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--accent), #b24bef);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            box-shadow: 0 0 24px rgba(123, 97, 255, 0.5);
        }

        h1 {
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #fff 40%, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .tagline {
            font-family: var(--font-mono);
            font-size: 0.82rem;
            color: var(--muted);
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        /* ── Input card ── */
        .input-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 28px;
            margin-bottom: 32px;
            animation: fadeUp 0.6s 0.1s ease both;
            box-shadow: 0 4px 40px rgba(0, 0, 0, 0.4);
        }

        .input-label {
            font-size: 0.75rem;
            font-family: var(--font-mono);
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 12px;
            display: block;
        }

        textarea {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-family: var(--font-head);
            font-size: 1rem;
            padding: 16px;
            resize: vertical;
            min-height: 100px;
            outline: none;
            transition: border-color 0.2s;
            line-height: 1.6;
        }

        textarea:focus {
            border-color: var(--accent);
        }

        textarea::placeholder {
            color: var(--muted);
        }

        .btn-row {
            display: flex;
            gap: 12px;
            margin-top: 16px;
            align-items: center;
        }

        .btn-analyze {
            background: linear-gradient(135deg, var(--accent), #b24bef);
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 14px 32px;
            font-family: var(--font-head);
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.02em;
            transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
            box-shadow: 0 4px 20px rgba(123, 97, 255, 0.4);
            position: relative;
            overflow: hidden;
        }

        .btn-analyze::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0);
            transition: background 0.15s;
        }

        .btn-analyze:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(123, 97, 255, 0.55);
        }

        .btn-analyze:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-analyze:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-clear {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            border-radius: 12px;
            padding: 14px 20px;
            font-family: var(--font-head);
            font-size: 0.9rem;
            cursor: pointer;
            transition: border-color 0.2s, color 0.2s;
        }

        .btn-clear:hover {
            border-color: var(--muted);
            color: var(--text);
        }

        /* ── Pipeline stepper ── */
        .pipeline {
            display: flex;
            gap: 0;
            margin-bottom: 32px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            animation: fadeUp 0.6s 0.2s ease both;
        }

        .step {
            flex: 1;
            padding: 18px 16px;
            text-align: center;
            border-right: 1px solid var(--border);
            transition: background 0.3s;
            position: relative;
        }

        .step:last-child {
            border-right: none;
        }

        .step-num {
            font-family: var(--font-mono);
            font-size: 0.65rem;
            color: var(--muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .step-label {
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--muted);
            transition: color 0.3s;
        }

        .step-icon {
            font-size: 1.3rem;
            margin-bottom: 6px;
            display: block;
            filter: grayscale(1);
            opacity: 0.4;
            transition: filter 0.3s, opacity 0.3s;
        }

        .step.active {
            background: rgba(123, 97, 255, 0.08);
        }

        .step.active .step-label {
            color: var(--accent);
        }

        .step.active .step-icon {
            filter: none;
            opacity: 1;
        }

        .step.done .step-label {
            color: var(--true);
        }

        .step.done .step-icon {
            filter: none;
            opacity: 1;
        }

        /* Pulse animation for active step */
        @keyframes pulse-bg {

            0%,
            100% {
                background: rgba(123, 97, 255, 0.06);
            }

            50% {
                background: rgba(123, 97, 255, 0.14);
            }
        }

        .step.active {
            animation: pulse-bg 1.4s ease infinite;
        }

        /* ── Result card ── */
        .result-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 4px 40px rgba(0, 0, 0, 0.4);
            animation: fadeUp 0.5s ease both;
            display: none;
        }

        .result-card.visible {
            display: block;
        }

        .result-header {
            padding: 24px 28px;
            display: flex;
            align-items: center;
            gap: 16px;
            border-bottom: 1px solid var(--border);
        }

        .verdict-badge {
            padding: 8px 18px;
            border-radius: 8px;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .badge-true {
            background: rgba(0, 229, 160, 0.12);
            color: var(--true);
            border: 1px solid rgba(0, 229, 160, 0.3);
        }

        .badge-partial {
            background: rgba(255, 179, 71, 0.12);
            color: var(--partial);
            border: 1px solid rgba(255, 179, 71, 0.3);
        }

        .badge-fake {
            background: rgba(255, 77, 109, 0.12);
            color: var(--fake);
            border: 1px solid rgba(255, 77, 109, 0.3);
        }

        .badge-opinion {
            background: rgba(123, 97, 255, 0.12);
            color: var(--opinion);
            border: 1px solid rgba(123, 97, 255, 0.3);
        }

        .badge-error {
            background: rgba(255, 100, 100, 0.12);
            color: #ff6464;
            border: 1px solid rgba(255, 100, 100, 0.3);
        }

        .result-type {
            font-family: var(--font-mono);
            font-size: 0.72rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-left: auto;
        }

        .result-body {
            padding: 28px;
        }

        .result-claim {
            font-size: 1.05rem;
            font-weight: 600;
            line-height: 1.5;
            margin-bottom: 20px;
            color: var(--text);
            padding-left: 14px;
            border-left: 3px solid var(--accent);
        }

        .result-section {
            margin-bottom: 20px;
        }

        .result-section-label {
            font-family: var(--font-mono);
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--muted);
            margin-bottom: 8px;
        }

        .result-section-text {
            font-size: 0.93rem;
            line-height: 1.65;
            color: #c8c8e0;
        }

        /* ── Sources ── */
        .sources-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .source-link {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            text-decoration: none;
            color: var(--muted);
            font-family: var(--font-mono);
            font-size: 0.75rem;
            transition: border-color 0.2s, color 0.2s;
            word-break: break-all;
        }

        .source-link:hover {
            border-color: var(--accent);
            color: var(--text);
        }

        .source-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            flex-shrink: 0;
        }

        /* ── History ── */
        .history-section {
            margin-top: 48px;
            animation: fadeUp 0.6s 0.3s ease both;
        }

        .history-title {
            font-family: var(--font-mono);
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--muted);
            margin-bottom: 14px;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .history-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
        }

        .history-item:hover {
            border-color: var(--accent);
            background: var(--surface2);
        }

        .history-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .dot-true {
            background: var(--true);
        }

        .dot-partial {
            background: var(--partial);
        }

        .dot-fake {
            background: var(--fake);
        }

        .dot-opinion {
            background: var(--opinion);
        }

        .history-claim-text {
            font-size: 0.88rem;
            color: var(--text);
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-badge {
            font-family: var(--font-mono);
            font-size: 0.65rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
            flex-shrink: 0;
        }

        /* ── Error banner ── */
        .error-banner {
            background: rgba(255, 77, 109, 0.1);
            border: 1px solid rgba(255, 77, 109, 0.3);
            border-radius: 12px;
            padding: 16px 20px;
            color: var(--fake);
            font-size: 0.88rem;
            margin-bottom: 20px;
            display: none;
            animation: fadeUp 0.3s ease;
        }

        .error-banner.visible {
            display: block;
        }

        /* ── Animations ── */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        /* ── Footer ── */
        footer {
            margin-top: 80px;
            text-align: center;
            font-family: var(--font-mono);
            font-size: 0.72rem;
            color: var(--muted);
            letter-spacing: 0.06em;
        }
    </style>
</head>

<body>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="wrapper">

        <!-- Header -->
        <header>
            <div class="logo-row">
                <div class="logo-icon">🔍</div>
                <h1>Unbubble</h1>
            </div>
            <p class="tagline">// AI-powered fact-checking engine · classify → search → verdict</p>
        </header>

        <!-- Input -->
        <div class="input-card">
            <label class="input-label" for="claimInput">Enter a claim to fact-check</label>
            <textarea id="claimInput"
                placeholder="e.g. Pope Francis died on April 21, 2025, prompting a conclave."></textarea>
            <div class="btn-row">
                <button class="btn-analyze" id="analyzeBtn" onclick="analyze()">
                    Analyze Claim
                </button>
                <button class="btn-clear" onclick="clearAll()">Clear</button>
            </div>
        </div>

        <!-- Pipeline stepper -->
        <div class="pipeline" id="pipeline">
            <div class="step" id="step1">
                <span class="step-icon">🧠</span>
                <div class="step-num">Step 01</div>
                <div class="step-label">Classify</div>
            </div>
            <div class="step" id="step2">
                <span class="step-icon">🌐</span>
                <div class="step-num">Step 02</div>
                <div class="step-label">Search</div>
            </div>
            <div class="step" id="step3">
                <span class="step-icon">⚖️</span>
                <div class="step-num">Step 03</div>
                <div class="step-label">Verdict</div>
            </div>
        </div>

        <!-- Error banner -->
        <div class="error-banner" id="errorBanner"></div>

        <!-- Result card -->
        <div class="result-card" id="resultCard">
            <div class="result-header">
                <span class="verdict-badge" id="verdictBadge"></span>
                <span class="result-type" id="resultType"></span>
            </div>
            <div class="result-body">
                <div class="result-claim" id="resultClaim"></div>

                <div class="result-section" id="explanationSection">
                    <div class="result-section-label">Explanation</div>
                    <div class="result-section-text" id="resultExplanation"></div>
                </div>

                <div class="result-section" id="summarySection">
                    <div class="result-section-label">What actually happened</div>
                    <div class="result-section-text" id="resultSummary"></div>
                </div>

                <div class="result-section" id="sourcesSection">
                    <div class="result-section-label">Sources</div>
                    <div class="sources-list" id="sourcesList"></div>
                </div>
            </div>
        </div>

        <!-- History -->
        <div class="history-section" id="historySection" style="display:none">
            <div class="history-title">// Recent checks</div>
            <div class="history-list" id="historyList"></div>
        </div>

        <footer>Unbubble · 3-step AI fact-checking pipeline · Gemini + Tavily</footer>
    </div>

    <script>
        const API_URL = "http://localhost:5000/analyze";
        const history = [];

        function setStep(active) {
            // active: 0 = none, 1 = classify, 2 = search, 3 = verdict, 4 = done
            ['step1', 'step2', 'step3'].forEach((id, i) => {
                const el = document.getElementById(id);
                el.classList.remove('active', 'done');
                const stepNum = i + 1;
                if (stepNum < active) el.classList.add('done');
                else if (stepNum === active) el.classList.add('active');
            });
        }

        function showError(msg) {
            const el = document.getElementById('errorBanner');
            el.textContent = '⚠ ' + msg;
            el.classList.add('visible');
        }

        function hideError() {
            document.getElementById('errorBanner').classList.remove('visible');
        }

        function getBadgeClass(verdict) {
            if (verdict === 'TRUE') return 'badge-true';
            if (verdict === 'PARTIALLY TRUE') return 'badge-partial';
            if (verdict === 'FAKE NEWS') return 'badge-fake';
            if (verdict === 'OPINION') return 'badge-opinion';
            return 'badge-error';
        }

        function getDotClass(verdict) {
            if (verdict === 'TRUE') return 'dot-true';
            if (verdict === 'PARTIALLY TRUE') return 'dot-partial';
            if (verdict === 'FAKE NEWS') return 'dot-fake';
            return 'dot-opinion';
        }

        function renderResult(claim, data) {
            const card = document.getElementById('resultCard');
            const badge = document.getElementById('verdictBadge');
            const typeEl = document.getElementById('resultType');
            const claimEl = document.getElementById('resultClaim');
            const explanationEl = document.getElementById('resultExplanation');
            const summaryEl = document.getElementById('resultSummary');
            const summarySection = document.getElementById('summarySection');
            const sourcesSection = document.getElementById('sourcesSection');
            const sourcesList = document.getElementById('sourcesList');

            badge.textContent = data.verdict;
            badge.className = 'verdict-badge ' + getBadgeClass(data.verdict);
            typeEl.textContent = '// ' + data.type;
            claimEl.textContent = claim;
            explanationEl.textContent = data.explanation;

            // Summary: only show if not TRUE
            if (data.verdict !== 'TRUE' && data.verdict !== 'OPINION' && data.summary) {
                summarySection.style.display = 'block';
                summaryEl.textContent = data.summary;
            } else {
                summarySection.style.display = 'none';
            }

            // Sources
            if (data.sources && data.sources.length > 0 && data.sources[0] !== 'N/A') {
                sourcesSection.style.display = 'block';
                sourcesList.innerHTML = data.sources.map(url =>
                    `<a class="source-link" href="${url}" target="_blank" rel="noopener">
          <span class="source-dot"></span>${url}
        </a>`
                ).join('');
            } else {
                sourcesSection.style.display = 'none';
            }

            card.classList.add('visible');
        }

        function addToHistory(claim, verdict) {
            history.unshift({ claim, verdict });
            if (history.length > 8) history.pop();

            const section = document.getElementById('historySection');
            const list = document.getElementById('historyList');
            section.style.display = 'block';

            list.innerHTML = history.map((h, i) => `
      <div class="history-item" onclick="loadFromHistory(${i})">
        <span class="history-dot ${getDotClass(h.verdict)}"></span>
        <span class="history-claim-text">${h.claim}</span>
        <span class="history-badge">${h.verdict}</span>
      </div>
    `).join('');
        }

        function loadFromHistory(i) {
            document.getElementById('claimInput').value = history[i].claim;
        }

        async function analyze() {
            const claim = document.getElementById('claimInput').value.trim();
            if (!claim) return;

            const btn = document.getElementById('analyzeBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Analyzing…';
            hideError();
            document.getElementById('resultCard').classList.remove('visible');
            setStep(1);

            try {
                // Simulate step progression while waiting
                const stepTimer1 = setTimeout(() => setStep(2), 2000);
                const stepTimer2 = setTimeout(() => setStep(3), 4500);

                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ claim })
                });

                clearTimeout(stepTimer1);
                clearTimeout(stepTimer2);

                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.error || `HTTP ${res.status}`);
                }

                const data = await res.json();
                setStep(4); // all done
                renderResult(claim, data);
                addToHistory(claim, data.verdict);

            } catch (err) {
                setStep(0);
                showError('Could not reach the backend. Make sure app.py is running on localhost:5000. — ' + err.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Analyze Claim';
            }
        }

        function clearAll() {
            document.getElementById('claimInput').value = '';
            document.getElementById('resultCard').classList.remove('visible');
            hideError();
            setStep(0);
        }

        // Allow Enter + Ctrl/Cmd to submit
        document.getElementById('claimInput').addEventListener('keydown', e => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') analyze();
        });
    </script>
</body>

</html>
